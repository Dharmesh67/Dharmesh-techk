<!DOCTYPE HTML>
<html>
<head>
    <title>Dharmesh Animated website</title>
    <meta name="viewport"
content="width=device-width,initial-scale=1.0">
    <style>
        body{
            margin: 0;
            font-family: Arial,sans-serif;
            background: linear-gradient(to right,#0f2027,#203a43,#2c5364);
            color: white;
            text-align: center;
        }
        nav{
            padding: 15px;
            background: rgba(0,0,0,0.4);
        }
        nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        nav a:hover{
            color: #00ffd5;
        }
        .hero{
            padding: 80px 20px;
            animation: fade In 2s ease-in-out;
        }
        .hero h1{
            font-size: 45px;
            color: #00ffd5;
        }
        .bn{
            padding: 12px 25px;
            background: #00ffd5;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover{
            background: #00bfa5;
            transform: scale(1.1);
        }
        .cards{
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }
        .card{
            background: rgba(0,0,0,0.5);
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .card:hover{
            transform: translateY(-10px);
            background: rgba(0,255,213,0.2);
        }
        footer{
            padding: 20px;
            background: rgba(0,0,0,0.4);
        }
        @keyframes fadeIn{
            form{opacity:0;transform:translateY(-20px);}
            to{opacity:1;transform:translateY(0);}
        }
    </style>
</head>
<body>
<nav>
    <a href="#">Home</a>
    <a href="#">projects</a>
    <a href="#">Contact</a>
</nav>
<div class="hero">
    <h1>Dharmesh developer</h1>
    <p>Future Full stack developer</p>
    <br>
    <a href="#" class="btn">explore</a>
</div>
<div class="cards">
    <div class="card">
        <h3>phython projects</h3>
        <p>Smart calculator,Games</p>
    </div>
    <div class="card">
        <h3>Web design</h3>
        <p>HTML,css,animation</p>
    </div>
    <div class="card">
        <h3>learning AI</h3>
        <p>Futire Goal</p>
    </div>
</div>
<footer>
    2026 Dharmesh | Animated website
</footer>
</body>
</html>
